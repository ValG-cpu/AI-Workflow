version: "3"

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"

    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=password
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n/ai_factory_workspace

    volumes:
      - ./n8n_data:/home/node/.n8n

    restart: always